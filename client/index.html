<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Keepaway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
      touch-action: none;
      font-family: 'Jua', 'Segoe UI', sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { display: block; border-radius: 12px; }

    /* Shared input styles (positioned by Phaser DOM element) */
    .keepaway-input {
      width: 240px; padding: 12px 16px;
      border-radius: 25px;
      border: 2px solid rgba(255,215,0,0.5);
      background: rgba(15, 12, 41, 0.85);
      backdrop-filter: blur(8px);
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 17px; text-align: center;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .keepaway-input:focus {
      border-color: #ffd700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    .keepaway-input::placeholder { color: rgba(255,255,255,0.4); }

    /* Dash button */
    #dash-btn {
      position: fixed;
      right: 24px; bottom: 50px;
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255, 150, 50, 0.8);
      background: radial-gradient(circle at 30% 30%, rgba(255, 130, 50, 0.9), rgba(200, 60, 20, 0.85));
      box-shadow: 0 4px 20px rgba(255, 100, 30, 0.5), inset 0 -3px 8px rgba(0,0,0,0.3);
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 15px;
      z-index: 100;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex; align-items: center; justify-content: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    #dash-btn:active {
      transform: scale(0.9);
      box-shadow: 0 2px 10px rgba(255, 100, 30, 0.3), inset 0 2px 8px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
