<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Keepaway</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f0c29" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <meta name="description" content="귀여운 강아지들의 실시간 멀티플레이어 뼈다귀 쟁탈전!" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
      touch-action: none;
      font-family: 'Jua', 'Segoe UI', sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { display: block; border-radius: 0; }

    /* ===== LOBBY OVERLAY ===== */
    #lobby-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      z-index: 500;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: env(keyboard-inset-height, 0px);
      opacity: 1;
      transition: opacity 0.4s ease-out;
    }
    #lobby-overlay.hidden { opacity: 0; pointer-events: none; }

    .lobby-panel {
      width: 92%; max-width: 400px;
      background: rgba(26, 22, 64, 0.92);
      border: 2px solid rgba(61, 47, 127, 0.6);
      border-radius: 24px;
      padding: 28px 24px;
      backdrop-filter: blur(12px);
      margin: 20px auto;
    }

    .lobby-title {
      font-family: 'Black Han Sans', 'Jua', sans-serif;
      font-size: 42px;
      color: #ffd700;
      text-align: center;
      text-shadow: 0 0 30px rgba(255,215,0,0.3);
      margin-bottom: 2px;
    }
    .lobby-poodle {
      text-align: center;
      font-size: 28px;
      margin-bottom: 4px;
    }
    .lobby-subtitle {
      text-align: center;
      color: #bbbbdd;
      font-size: 15px;
      margin-bottom: 24px;
    }

    .lobby-input {
      display: block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 25px;
      border: 2px solid rgba(255,215,0,0.4);
      background: rgba(15, 12, 41, 0.85);
      backdrop-filter: blur(8px);
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 17px;
      text-align: center;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      margin-bottom: 16px;
    }
    .lobby-input:focus {
      border-color: #ffd700;
      box-shadow: 0 0 20px rgba(255,215,0,0.25);
    }
    .lobby-input::placeholder { color: rgba(255,255,255,0.35); }

    .lobby-btns {
      display: flex; gap: 12px;
      margin-bottom: 12px;
    }
    .lobby-btn {
      flex: 1;
      padding: 14px 8px;
      border: none; border-radius: 25px;
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.15s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      -webkit-tap-highlight-color: transparent;
    }
    .lobby-btn:active { transform: scale(0.95); }
    .lobby-btn.red { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .lobby-btn.red:hover { filter: brightness(1.15); }
    .lobby-btn.blue { background: linear-gradient(135deg, #3498db, #2980b9); }
    .lobby-btn.blue:hover { filter: brightness(1.15); }
    .lobby-btn.green { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .lobby-btn.green:hover { filter: brightness(1.15); }
    .lobby-btn.orange { background: linear-gradient(135deg, #f39c12, #e67e22); }
    .lobby-btn.orange:hover { filter: brightness(1.15); }
    .lobby-btn.small { padding: 10px 20px; font-size: 14px; flex: none; }
    .lobby-btn:active { filter: brightness(0.9); transform: scale(0.97); }

    #join-section { display: none; }
    #join-section .lobby-input {
      letter-spacing: 8px;
      text-transform: uppercase;
    }

    /* --- In-Room View --- */
    #lobby-room { display: none; }

    .room-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .back-btn {
      background: none; border: none;
      color: #8888aa; font-family: 'Jua', sans-serif; font-size: 14px;
      cursor: pointer; padding: 4px 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { color: #ffffff; }
    .share-btn {
      background: linear-gradient(135deg, #3498db, #2980b9);
      border: none; border-radius: 16px;
      color: #fff; font-family: 'Jua', sans-serif; font-size: 12px;
      padding: 6px 14px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }
    .share-btn:active { transform: scale(0.93); }
    .room-badge {
      color: #aaffaa;
      font-size: 14px;
      text-align: right;
    }

    .char-label {
      text-align: center;
      color: #ffd700;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .char-card {
      position: relative;
      background: rgba(42, 36, 96, 0.6);
      border: 2px solid rgba(61, 47, 127, 0.3);
      border-radius: 14px;
      padding: 10px 3px 6px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .char-card:active { transform: scale(0.93); }
    .char-card:hover { background: rgba(58, 52, 128, 0.7); }
    .char-card.selected {
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.15);
      animation: selectedPulse 2s ease-in-out infinite;
    }
    @keyframes selectedPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.2); }
      50% { box-shadow: 0 0 18px rgba(255, 215, 0, 0.45); }
    }
    .char-card .char-emoji { font-size: 24px; line-height: 1.2; }
    .char-card .char-name {
      font-size: 12px; color: #ccccdd;
      margin-top: 4px;
    }
    .char-card.selected .char-name { color: #ffd700; }
    .char-card .char-check {
      position: absolute; top: 4px; right: 6px;
      color: #ffd700; font-size: 14px; font-weight: bold;
      display: none;
    }
    .char-card.selected .char-check { display: block; }

    /* --- Game Selection Grid --- */
    .game-label {
      text-align: center;
      color: #88ddff;
      font-size: 16px;
      margin-bottom: 10px;
    }
    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .game-card {
      background: rgba(42, 36, 96, 0.6);
      border: 2px solid rgba(61, 47, 127, 0.3);
      border-radius: 12px;
      padding: 8px 4px 6px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .game-card:active { transform: scale(0.93); }
    .game-card.selected {
      border-color: #88ddff;
      background: rgba(100, 180, 255, 0.15);
      box-shadow: 0 0 10px rgba(100, 180, 255, 0.2);
    }
    .game-card.disabled { opacity: 0.5; pointer-events: none; }
    .game-card .game-emoji { font-size: 22px; line-height: 1.2; }
    .game-card .game-name {
      font-size: 9px; color: #ccccdd;
      margin-top: 2px; line-height: 1.1;
    }
    .game-card.selected .game-name { color: #88ddff; }

    .room-divider {
      border: none;
      border-top: 1px solid rgba(61, 47, 127, 0.5);
      margin: 14px 0;
    }

    .players-label {
      text-align: center;
      color: #bbbbdd;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .player-list {
      text-align: center;
      color: #ffffff;
      font-size: 15px;
      line-height: 1.8;
      min-height: 30px;
      margin-bottom: 16px;
    }

    .room-footer {
      text-align: center;
    }
    #wait-text {
      color: #8888aa;
      font-size: 13px;
    }
    #btn-start {
      display: none;
      width: 100%;
    }

    #lobby-status {
      text-align: center;
      color: #ff8888;
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
    }

    /* Ambient paw prints */
    .paw-ambient {
      position: fixed;
      font-size: 24px;
      opacity: 0.06;
      pointer-events: none;
      animation: pawFloat 6s ease-in-out infinite alternate;
    }
    @keyframes pawFloat {
      from { transform: translateY(0) rotate(0deg); opacity: 0.04; }
      to { transform: translateY(-40px) rotate(15deg); opacity: 0.1; }
    }

    /* ===== EMOJI BAR ===== */
    .emoji-bar {
      position: fixed; bottom: 155px; right: 30px;
      z-index: 400; display: flex; flex-direction: column-reverse; align-items: center; gap: 4px;
    }
    .emoji-bar.collapsed .emoji-row { display: none; }
    .emoji-toggle {
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(0,0,0,0.45); border: 2px solid rgba(255,255,255,0.15);
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .emoji-row {
      display: flex; flex-direction: column; gap: 3px; background: rgba(0,0,0,0.55); border-radius: 20px; padding: 6px 3px;
    }
    .emoji-btn {
      width: 34px; height: 34px; border: none; background: rgba(255,255,255,0.1);
      border-radius: 50%; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .emoji-btn:active { background: rgba(255,255,255,0.3); }

    /* ===== LOBBY CHAT ===== */
    .lobby-chat {
      margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;
    }
    .lobby-chat-messages {
      max-height: 80px; overflow-y: auto; margin-bottom: 6px; font-size: 12px;
      color: #ddd; font-family: Jua, sans-serif; line-height: 1.5;
    }
    .lobby-chat-line b { color: #ffd700; margin-right: 2px; }
    .lobby-chat-row { display: flex; gap: 6px; }
    .lobby-chat-field {
      flex: 1; padding: 6px 10px; border: 1px solid rgba(255,215,0,0.3);
      border-radius: 16px; background: rgba(0,0,0,0.3); color: #fff;
      font-family: Jua, sans-serif; font-size: 12px; outline: none;
    }
    .lobby-chat-send-btn {
      padding: 6px 12px; background: #3498db; color: #fff; border: none;
      border-radius: 16px; font-family: Jua, sans-serif; font-size: 12px; cursor: pointer;
    }

    /* ===== STATS PANEL ===== */
    .stats-panel {
      margin-top: 8px; padding: 10px; background: rgba(0,0,0,0.3);
      border-radius: 12px; font-family: Jua, sans-serif; color: #ddd;
    }
    .stats-panel.hidden { display: none; }
    .stats-summary { display: flex; gap: 12px; justify-content: center; font-size: 14px; margin-bottom: 8px; color: #ffd700; }
    .stats-modes { font-size: 12px; }
    .stats-mode-row { padding: 2px 0; }

    /* ===== LANDSCAPE RESPONSIVE ===== */
    @media (orientation: landscape) and (max-height: 500px) {
      #lobby-overlay { align-items: flex-start; padding-top: 8px; }
      .lobby-panel { padding: 14px 18px; max-width: 380px; }
      .lobby-title { font-size: 26px; margin-bottom: 0; }
      .lobby-poodle { font-size: 18px; margin-bottom: 2px; }
      .lobby-subtitle { font-size: 11px; margin-bottom: 10px; }
      .lobby-input { padding: 9px 12px; font-size: 14px; margin-bottom: 8px; }
      .lobby-btn { padding: 9px 6px; font-size: 13px; }
      .lobby-btns { margin-bottom: 8px; gap: 8px; }
      .char-label { font-size: 13px; margin-bottom: 6px; }
      .char-grid { gap: 4px; margin-bottom: 8px; }
      .char-card { padding: 6px 3px 4px; border-radius: 10px; }
      .char-card .char-emoji { font-size: 20px; }
      .char-card .char-name { font-size: 9px; margin-top: 2px; }
      .room-divider { margin: 8px 0; }
      .players-label { font-size: 12px; margin-bottom: 4px; }
      .player-list { font-size: 13px; line-height: 1.5; margin-bottom: 8px; }
      #lobby-status { font-size: 11px; margin-top: 6px; }
      #dash-btn { width: 70px; height: 70px; right: 16px; bottom: 30px; font-size: 13px; }
      .emoji-bar { bottom: 110px; right: 20px; }
      .emoji-toggle { width: 34px; height: 34px; font-size: 18px; }
      .emoji-btn { width: 30px; height: 30px; font-size: 16px; }
      .game-label { font-size: 12px; margin-bottom: 6px; }
      .game-grid { gap: 4px; margin-bottom: 8px; }
      .game-card { padding: 5px 3px 4px; border-radius: 8px; }
      .game-card .game-emoji { font-size: 16px; }
      .game-card .game-name { font-size: 8px; }
    }

    /* ===== ROTATE PHONE OVERLAY (game only, not lobby) ===== */
    #rotate-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15, 12, 41, 0.97);
      z-index: 9999;
      flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff;
      font-family: 'Jua', sans-serif;
      text-align: center;
    }
    #rotate-overlay .rotate-icon {
      font-size: 80px;
      animation: rotatePhone 1.5s ease-in-out infinite alternate;
      margin-bottom: 20px;
    }
    #rotate-overlay .rotate-text {
      font-size: 20px;
      color: #ffd700;
    }
    #rotate-overlay .rotate-sub {
      font-size: 14px;
      color: #8888aa;
      margin-top: 8px;
    }
    #rotate-overlay .rotate-install {
      margin-top: 20px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      border: none; border-radius: 25px;
      color: #fff; font-family: 'Jua', sans-serif; font-size: 15px;
      cursor: pointer; display: none;
    }
    @keyframes rotatePhone {
      from { transform: rotate(0deg); }
      to { transform: rotate(90deg); }
    }

    /* ===== DASH BUTTON ===== */
    #dash-btn {
      position: fixed;
      right: 24px; bottom: 50px;
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255, 150, 50, 0.8);
      background: radial-gradient(circle at 30% 30%, rgba(255, 130, 50, 0.9), rgba(200, 60, 20, 0.85));
      box-shadow: 0 4px 20px rgba(255, 100, 30, 0.5), inset 0 -3px 8px rgba(0,0,0,0.3);
      color: #fff;
      font-family: 'Jua', sans-serif;
      font-size: 15px;
      z-index: 100;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex; align-items: center; justify-content: center;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    #dash-btn:active {
      transform: scale(0.9);
      box-shadow: 0 2px 10px rgba(255, 100, 30, 0.3), inset 0 2px 8px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- ===== ROTATE PHONE OVERLAY (shown during game in portrait) ===== -->
  <div id="rotate-overlay">
    <div class="rotate-icon">📱</div>
    <div class="rotate-text">화면을 가로로 돌려주세요</div>
    <div class="rotate-sub">가로 모드에서 플레이할 수 있습니다</div>
    <button class="rotate-install" id="rotate-install-btn">📲 앱으로 설치하면 자동 가로!</button>
  </div>

  <!-- ===== LOBBY OVERLAY ===== -->
  <div id="lobby-overlay">
    <!-- Ambient paw prints -->
    <div class="paw-ambient" style="top:10%;left:8%;animation-delay:0s">🐾</div>
    <div class="paw-ambient" style="top:30%;right:12%;animation-delay:1.5s;font-size:18px">🐾</div>
    <div class="paw-ambient" style="bottom:20%;left:15%;animation-delay:3s;font-size:30px">🐾</div>
    <div class="paw-ambient" style="top:60%;right:8%;animation-delay:2s">🐾</div>
    <div class="paw-ambient" style="bottom:10%;right:25%;animation-delay:4s;font-size:16px">🐾</div>

    <!-- PRE-ROOM VIEW -->
    <div id="lobby-pre">
      <div class="lobby-panel">
        <div class="lobby-poodle">🐾</div>
        <div class="lobby-title">DOGGY GAMES</div>
        <div class="lobby-subtitle">친구들과 함께하는 미니게임!</div>

        <input id="name-input" class="lobby-input" placeholder="닉네임 입력" maxlength="10" />

        <div class="lobby-btns">
          <button id="btn-create" class="lobby-btn red">방 만들기</button>
          <button id="btn-join-show" class="lobby-btn blue">방 참여</button>
        </div>

        <div id="join-section">
          <input id="code-input" class="lobby-input" placeholder="방 코드 (4자리)" maxlength="4" />
          <button id="btn-confirm-join" class="lobby-btn green">입장</button>
        </div>

        <div id="lobby-status"></div>

        <button id="btn-stats" class="lobby-btn" style="width:100%;margin-top:8px;background:linear-gradient(135deg,#8e44ad,#9b59b6);font-size:14px;padding:8px;">📊 전적</button>
        <div id="stats-panel" class="stats-panel hidden"></div>
      </div>
    </div>

    <!-- IN-ROOM VIEW -->
    <div id="lobby-room">
      <div class="lobby-panel">
        <div class="room-header">
          <button id="btn-back" class="back-btn">← 뒤로</button>
          <div id="room-badge" class="room-badge"></div>
          <button id="btn-share" class="share-btn">📋 공유</button>
        </div>

        <div class="char-label">🐾 캐릭터 선택</div>
        <div id="char-grid" class="char-grid"></div>

        <div class="game-label">🎮 게임 선택</div>
        <div id="game-grid" class="game-grid"></div>

        <hr class="room-divider" />

        <div class="players-label">👥 대기실</div>
        <div id="player-list" class="player-list"></div>

        <!-- Lobby Chat -->
        <div id="lobby-chat" class="lobby-chat">
          <div id="lobby-chat-messages" class="lobby-chat-messages"></div>
          <div class="lobby-chat-row">
            <input id="lobby-chat-input" class="lobby-chat-field" type="text" placeholder="메시지..." maxlength="50" autocomplete="off">
            <button id="lobby-chat-send" class="lobby-chat-send-btn">전송</button>
          </div>
        </div>

        <div class="room-footer">
          <button id="btn-ready" class="lobby-btn orange" style="display:none;width:100%;margin-bottom:8px;">준비</button>
          <button id="btn-start" class="lobby-btn orange" style="display:none;">▶  게임 시작</button>
          <div id="wait-text">호스트가 게임을 시작할 때까지 기다려주세요...</div>
        </div>

        <div id="lobby-status-room"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script>
    // Try to lock orientation to landscape on mobile
    try {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    } catch(e) {}

    // Scroll input into view when mobile keyboard opens
    document.querySelectorAll('.lobby-input').forEach(input => {
      input.addEventListener('focus', () => {
        setTimeout(() => {
          input.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
      });
    });

    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // PWA install prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const installBtn = document.getElementById('rotate-install-btn');
      if (installBtn) installBtn.style.display = 'block';
    });
    document.getElementById('rotate-install-btn')?.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      }
    });

    // Show rotate overlay only during game (when lobby is hidden)
    const rotateOverlay = document.getElementById('rotate-overlay');
    function checkRotate() {
      const lobbyHidden = document.getElementById('lobby-overlay')?.classList.contains('hidden');
      const isPortrait = window.innerHeight > window.innerWidth;
      const isMobile = window.innerWidth < 900 || window.innerHeight < 900;
      if (lobbyHidden && isPortrait && isMobile) {
        rotateOverlay.style.display = 'flex';
      } else {
        rotateOverlay.style.display = 'none';
      }
    }
    window.addEventListener('resize', checkRotate);
    window.addEventListener('orientationchange', () => setTimeout(checkRotate, 200));
    // Check periodically (lobby state changes)
    setInterval(checkRotate, 1000);
  </script>
</body>
</html>
