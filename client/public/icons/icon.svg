<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Bone -->
  <g transform="translate(256, 200)">
    <circle cx="-45" cy="0" r="30" fill="#ffd700"/>
    <circle cx="45" cy="0" r="30" fill="#ffd700"/>
    <rect x="-30" y="-18" width="60" height="36" rx="8" fill="#ffd700"/>
    <circle cx="-40" cy="-8" r="10" fill="#fff8dc" opacity="0.6"/>
  </g>
  <!-- Dog face -->
  <g transform="translate(256, 340)">
    <!-- Ears -->
    <circle cx="-55" cy="-40" r="25" fill="#e8d5b7"/>
    <circle cx="55" cy="-40" r="25" fill="#e8d5b7"/>
    <!-- Head -->
    <circle cx="0" cy="0" r="60" fill="#f5deb3"/>
    <!-- Eyes -->
    <circle cx="-20" cy="-10" r="10" fill="#222"/>
    <circle cx="20" cy="-10" r="10" fill="#222"/>
    <circle cx="-16" cy="-14" r="4" fill="#fff" opacity="0.8"/>
    <circle cx="24" cy="-14" r="4" fill="#fff" opacity="0.8"/>
    <!-- Nose -->
    <ellipse cx="0" cy="12" rx="10" ry="8" fill="#444"/>
    <!-- Mouth -->
    <path d="M-12 22 Q0 32 12 22" stroke="#666" stroke-width="2.5" fill="none"/>
    <!-- Blush -->
    <circle cx="-35" cy="10" r="10" fill="#ffb6c1" opacity="0.4"/>
    <circle cx="35" cy="10" r="10" fill="#ffb6c1" opacity="0.4"/>
  </g>
  <!-- Title sparkles -->
  <circle cx="120" cy="120" r="8" fill="#ffd700" opacity="0.6"/>
  <circle cx="400" cy="100" r="6" fill="#ffd700" opacity="0.5"/>
  <circle cx="100" cy="400" r="5" fill="#ffd700" opacity="0.4"/>
  <circle cx="420" cy="380" r="7" fill="#ffd700" opacity="0.5"/>
</svg>
